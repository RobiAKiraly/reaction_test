<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Tester</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>⚡ Reaction Tester</h1>
        <p>Test your reflexes with two different games.</p>
    </header>

    <div class="menu">
        <button onclick="showGame('f1')">F1 Lights</button>
        <button onclick="showGame('click')">Target Click</button>
    </div>

    <!-- F1 GAME -->
    <section id="f1Game" class="game">
        <h2>🏁 F1 Reaction Test</h2>

        <div class="lights">
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
            <div class="light"></div>
        </div>

        <button id="startF1">Start</button>
        <p id="f1Result">Press Start</p>
    </section>

    <!-- CLICK GAME -->
    <section id="clickGame" class="game hidden">
        <h2>🎯 30 Second Challenge</h2>

        <button id="startClick">
            Start 30s Challenge
        </button>


        <div id="playArea">
            <div id="target"></div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
